baseurl = "http://jaredwatkins.com/"
title = "The Infinite Unknown"
languageCode = "en-us"
theme = "Mainroad"
paginate = 10 # Number of posts to show before paginating
metaDataFormat = "yaml"
disqusShortname = "jaredwatkins"

[permalinks]
  post = "/:year/:month/:title/"

enableRobotsTXT = true # Suggested, enable robots.txt file
googleAnalytics = "UA-12506512-2" # Optional, add tracking Id for analytics


[params]
  description = "" # Suggested, controls homepage description meta
  author = "Jared Watkins" # Optional, controls author name display on posts
  show_menu = true # Optional, set false to disable menu entirely
  powered_by = false # Optional, set false to disable theme credits

  # mainroad theme options
  opengraph = true
  leftsidebar = false # Move sidebar to the left side if true
  authorbox = false
  post_navigation = true

  [Params.widgets]
    search = true # Enable "Search" widget
    recent_articles = true # Enable "Recent arcticles" widget
    categories = true # Enable "Categories" widget
    tags = true # Enable "Tags" widget
    header_image = "/pics/headers/glacierplanelanding2_header.jpg"

  ######

  [params.seo]
    google_verify = "" # Optional, Google verification code
    bing_verify = "" # Optional, Bing verification code
    yandex_verify = "" # Optional, Yandex verification code

[menu]
  [[menu.main]]
    name = "Home"
    weight = 0
    identifier = "home"
    url = "/"
  [[menu.main]]
    name = "Posts"
    weight = 2
    identifier = "post"
    url = "/post/"
  [[menu.main]]
    name = "Projects"
    weight = 4
    identifier = "project"
    url = "/projects/"


